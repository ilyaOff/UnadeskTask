version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: pdf_rabbitmq_dev
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - pdf_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: pdf_postgres_dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pdf_processing
      POSTGRES_USER: pdf_user
      POSTGRES_PASSWORD: pdf_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pdf_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdf_user -d pdf_processing"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  pdf_network:
    driver: bridge

volumes:
  rabbitmq_data:
  postgres_data: